[package]
name = "inkbridge-daemon"
version = "0.1.0"
edition = "2021"
description = "Reads the rMPP pen digitizer and streams PenPackets over TCP to the Windows OTD plugin."

[dependencies]
evdev = "0.12"
libc = "0.2"

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
strip = true
panic = "abort"
